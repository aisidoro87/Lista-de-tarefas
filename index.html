<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tarefas</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container-tarefas">
        <div class="header-container">
            <h1 class="main-title">Minhas Tarefas</h1>
            <img src="assets/lista-de-tarefas.png" alt="Ícone lista de tarefas">
        </div>

        <div class="input-group">

            <label for="taskInput" class="sr-only">Nova tarefa</label>
            <input type="text" id="taskInput" placeholder="Digite uma nova tarefa...">

                <label for="priorityInput" class="sr-only">Prioridade da tarefa</label>

            <select id="priorityInput">
                <option value="">Prioridade</option>
                <option value="low">Baixa</option>
                <option value="medium">Média</option>
                <option value="high">Alta</option>
            </select>

            <button id="addBtn" type="button">Adicionar</button>
        </div>

        <p id="errorMessage" class="error-message"></p>

        <div class="filter-container">
            <button class="btn-filter todas">Todas</button>
            <button class="btn-filter pendentes">Pendentes</button>
            <button class="btn-filter concluidas">Concluídas</button>
        </div>

        <h2 class="section-title">Tarefas Pendentes</h2>
        <div class="tasks-container">
            <div class="priority-column" id="low-priority">
                <h2 class="baixa">Baixa</h2>
                <ul id="lowPriorityList"></ul>
            </div>
            <div class="priority-column" id="medium-priority">
                <h2 class="media">Média</h2>
                <ul id="mediumPriorityList"></ul>
            </div>
            <div class="priority-column" id="high-priority">
                <h2 class="alta">Alta</h2>
                <ul id="highPriorityList"></ul>
            </div>
        </div>

    </div>

    <div class="container-completed">
        <div class="completed-header">
            <h2 class="section-title">Tarefas Concluídas</h2>
            <div class="completed-bulk-actions">

                <input type="checkbox" id="selectAllCompleted" aria-label="Selecionar todas as tarefas concluídas" title="Selecionar Todas">
                <button id="deleteSelectedBtn" class="clear-btn" style="display: none;">Excluir Selecionados</button>
            </div>
        </div>
        <ul id="completedTaskList">
            <!-- As tarefas concluídas serão movidas para cá -->
        </ul>
    </div>

    <script src="main.js"></script>
</body>

</html>
