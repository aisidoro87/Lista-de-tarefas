<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tarefas</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container-tarefas">
        <div class="header-container">
            <h1>Minhas Tarefas</h1>
            <img src="assets/lista-de-tarefas.png" alt="Ícone lista de tarefas">
        </div>

        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Digite uma nova tarefa...">
            <button id="addBtn">Adicionar</button>
        </div>
        <p id="errorMessage" class="error-message"></p>

        <div id="unprioritized-container" style="display: none;">
            <h3>Novas Tarefas</h3>
            <ul id="unprioritizedTaskList"></ul>
        </div>

        <div class="tasks-container">
            <div class="priority-column">
                <h3 class="baixa">Baixa Prioridade</h3>
                <ul id="lowPriorityList" class="task-list-column"></ul>
            </div>
            <div class="priority-column">
                <h3 class="media">Média Prioridade</h3>
                <ul id="mediumPriorityList" class="task-list-column"></ul>
            </div>
            <div class="priority-column">
                <h3 class="alta">Alta Prioridade</h3>
                <ul id="highPriorityList" class="task-list-column"></ul>
            </div>
        </div>
    </div>

    <div class="container-completed">
        <div class="completed-header">
            <h2>Tarefas Concluídas</h2>
            <div class="completed-bulk-actions">
                <input type="checkbox" id="selectAllCompleted" title="Selecionar Todas">
                <button id="deleteSelectedBtn" class="clear-btn" style="display: none;">Excluir Selecionados</button>
            </div>
        </div>
        <ul id="completedTaskList">
            <!-- As tarefas concluídas serão movidas para cá -->
        </ul>
    </div>

    <script src="main.js"></script>
</body>

</html>
